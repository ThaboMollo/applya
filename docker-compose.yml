services:
  docling-serve:
    image: quay.io/docling-project/docling-serve:latest
    # TODO: Pin to a specific version tag before deploying to Railway
    # e.g. quay.io/docling-project/docling-serve:v0.4.0
    # Check latest stable: https://quay.io/repository/docling-project/docling-serve?tab=tags
    ports:
      - "5001:5000"
    environment:
      DOCLING_SERVE_MAX_WORKERS: "1"
      DOCLING_SERVE_ENABLE_UI: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Docling loads ML models on startup — give it 90s before health checks kick in
      start_period: 90s
